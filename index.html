<!DOCTYPE html>
<html lang="en">   
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #818181;
            font-family: Comic Sans MS, sans-serif;
            color: #333;
            height: 100vh;
        }

        .wrapper {
            display: flex;
            flex-direction: row;
            height: 100%;
        }

        .sidebar {
            width: 200px;
            background-color: #9a9a9a;
            padding: 20px;
            border-right: 2px solid #7a7a7a;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #222;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin-bottom: 12px;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #333;
            font-size: 14px;
            display: block;
            padding: 8px 10px;
        }

        .sidebar ul li a:hover {
            background-color: #7a7a7a;
            color: white;
        }

        .content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            text-align: center;
        }

        .content h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .content p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        img {
            border: 5px solid #ababab;
            border-radius: 8px;
            margin-top: 20px;
            max-width: 100%;
            height: auto;
        }

        button {
            padding: 10px 20px;
            font-family: Comic Sans MS, sans-serif;
            font-size: 16px;
            background-color: #797979;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #a4a4a4;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <h2>Menu</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="content">
        <h1>hi</h1>
        <p>this is a front lol.</p>
        <img src="img/sterlingfreeman.png" alt="Sterling Freeman">
    </main>
</div>

</body>
</html>
